name: Build and push image to GHCR

# Pre-builds the worker image on a GitHub-hosted x86 runner and pushes it to
# GHCR. RunPod then deploys from the prebuilt image (registry pull) instead of
# building from GitHub — which sidesteps RunPod's ~30-minute build ceiling that
# the ~16-18 GB MinerU/vLLM image kept hitting (workers stuck on
# "image pull: ... pending"). GitHub Actions jobs allow up to 6 hours.

on:
  push:
    branches: [main]
    paths:
      - Dockerfile
      - requirements.txt
      - handler.py
      - worker/**
      - .runpod/test-fixture.pdf
      - .github/workflows/build-push-ghcr.yml
  workflow_dispatch:

concurrency:
  group: ghcr-build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      # The vllm/vllm-openai base extracts to ~30 GB; with MinerU + the baked
      # VLM model the build peaks well above the runner's default free space.
      # Reclaim ~30 GB by stripping toolchains the build doesn't need.
      - name: Free disk space
        uses: jlumbroso/free-disk-space@main
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Checkout
        uses: actions/checkout@v4

      - name: Compute lowercase image name
        id: img
        run: echo "name=ghcr.io/$(echo '${{ github.repository }}' | tr '[:upper:]' '[:lower:]')" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          # Single-platform image — skip the attestation manifest so the tag is
          # a plain image RunPod pulls without manifest-list ambiguity.
          provenance: false
          tags: |
            ${{ steps.img.outputs.name }}:latest
            ${{ steps.img.outputs.name }}:${{ github.sha }}

      - name: Summary
        run: |
          {
            echo "## Image pushed"
            echo ""
            echo '- `${{ steps.img.outputs.name }}:latest`'
            echo '- `${{ steps.img.outputs.name }}:${{ github.sha }}`'
            echo ""
            echo "Deploy on RunPod from this image (not build-from-GitHub)."
          } >> "$GITHUB_STEP_SUMMARY"
